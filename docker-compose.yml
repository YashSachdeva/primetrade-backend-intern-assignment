services:
  postgres:
    image: postgres:16-alpine
    container_name: primetrade-postgres
    environment:
      POSTGRES_USER: primetrade
      POSTGRES_PASSWORD: primetrade
      POSTGRES_DB: primetrade_assignment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: primetrade-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
